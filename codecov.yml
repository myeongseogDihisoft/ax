# Codecov 커버리지 정책
# 문서: https://docs.codecov.com/docs/codecovyml-reference

coverage:
  precision: 1
  round: down
  range: "70...95"

  status:
    project:
      default:
        target: 90%
        threshold: 2%
        informational: false
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 0%
        if_ci_failed: error

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "src/main/java/com/example/board/BoardApplication.java"
